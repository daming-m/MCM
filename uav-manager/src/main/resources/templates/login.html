<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container" style="max-width: 420px; margin-top: 80px;">
    <h3>无人机信息管理系统</h3>
    <p class="text-muted">请登录后继续</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${param.logout}" class="alert alert-success">已退出登录</div>

    <form method="post" th:action="@{/login}">
        <div class="form-group">
            <label>用户名</label>
            <input class="form-control" type="text" name="username" autocomplete="username" required/>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required/>
        </div>
        <button class="btn btn-primary btn-block" type="submit">登录</button>
        <hr/>
        <p class="text-muted">默认账号：admin / admin</p>
    </form>
</div>
</body>
</html>
