<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>无人机管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; }
        .login-wrap { margin-top: 100px; }
        .panel-heading { font-size: 18px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container login-wrap">
    <div class="row">
        <div class="col-sm-4 col-sm-offset-4">
            <div class="panel panel-primary">
                <div class="panel-heading text-center">无人机管理系统登录</div>
                <div class="panel-body">
                    <div class="alert alert-danger" th:if="${param.error}">用户名或密码错误</div>
                    <div class="alert alert-success" th:if="${param.logout}">您已退出登录</div>
                    <form method="post" th:action="@{/login}">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input id="username" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">登录</button>
                    </form>
                    <hr>
                    <p class="text-muted">管理员：admin/admin123</p>
                    <p class="text-muted">查看者：viewer/viewer123</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
